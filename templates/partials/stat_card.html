{% if color == 'primary' or not color %}
<div class="col-md-3">
  <div class="card stat-card stat-card-activas shadow-sm mb-3">
    <div class="card-body">
      <div class="stat-icon"><i class="fas fa-{{ icono|default:'box' }}"></i></div>
      <div class="stat-value">{{ valor }}</div>
      <div class="stat-label">{{ label }}</div>
    </div>
  </div>
</div>
{% elif color == 'info' %}
<div class="col-md-3">
  <div class="card stat-card stat-card-transito shadow-sm mb-3">
    <div class="card-body">
      <div class="stat-icon"><i class="fas fa-{{ icono|default:'truck' }}"></i></div>
      <div class="stat-value">{{ valor }}</div>
      <div class="stat-label">{{ label }}</div>
    </div>
  </div>
</div>
{% elif color == 'danger' %}
<div class="col-md-3">
  <div class="card stat-card stat-card-retraso shadow-sm mb-3">
    <div class="card-body">
      <div class="stat-icon"><i class="fas fa-{{ icono|default:'exclamation-triangle' }}"></i></div>
      <div class="stat-value">{{ valor }}</div>
      <div class="stat-label">{{ label }}</div>
    </div>
  </div>
</div>
{% elif color == 'success' %}
<div class="col-md-3">
  <div class="card stat-card stat-card-entregadas shadow-sm mb-3">
    <div class="card-body">
      <div class="stat-icon"><i class="fas fa-{{ icono|default:'check-circle' }}"></i></div>
      <div class="stat-value">{{ valor }}</div>
      <div class="stat-label">{{ label }}</div>
    </div>
  </div>
</div>
{% endif %}
